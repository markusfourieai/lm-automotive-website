story_heading: "The L&M Story"
story_p1: "L&M Automotive Performance was founded with one clear vision: to deliver exceptional automotive care that goes beyond the ordinary. What started as a small, passionate workshop in Stellenbosch has grown into one of the Western Cape's most respected performance automotive centres."
story_p2: "Our journey began with a deep love for cars and an even deeper commitment to the people who drive them. Over the years, we have earned the trust of hundreds of clients — from daily commuters who need reliable servicing to motorsport enthusiasts who demand race-ready precision."
story_p3: "Based in Plankenburg, Stellenbosch, we are conveniently located to serve the greater Winelands and Cape Town area. We invest continuously in training and equipment so that we can offer our clients the very best in modern automotive care."

quote_text: "We don't just fix cars — we build relationships. Every vehicle that comes through our doors gets treated with the same care and attention to detail as our own."

values:
  - title: "Quality"
    icon: "fas fa-medal"
    desc: "We never cut corners. Every service, repair, and build is completed to the highest standard using quality parts and materials."
  - title: "Integrity"
    icon: "fas fa-handshake"
    desc: "Honest, transparent communication. We tell you what your vehicle needs — and what it doesn't. No unnecessary upsells, ever."
  - title: "Performance"
    icon: "fas fa-flag-checkered"
    desc: "We are enthusiasts at heart. We push every vehicle to its potential, whether it's a daily driver or a dedicated race machine."
  - title: "Customer Focus"
    icon: "fas fa-users"
    desc: "Your satisfaction is our measure of success. We go the extra mile to ensure every client leaves happy and confident in their vehicle."

why:
  - title: "Expert Technicians"
    icon: "fas fa-tools"
    color: "red"
    desc: "Our team brings decades of combined hands-on experience across all vehicle makes, models, and motorsport disciplines."
  - title: "Modern Equipment"
    icon: "fas fa-microchip"
    color: "blue"
    desc: "We invest in the latest diagnostic and workshop technology so we can identify and solve problems faster and more accurately."
  - title: "Guaranteed Work"
    icon: "fas fa-shield-alt"
    color: "red"
    desc: "We stand behind everything we do. All our services come with a workmanship guarantee for your peace of mind."
  - title: "Fair Pricing"
    icon: "fas fa-dollar-sign"
    color: "blue"
    desc: "Competitive, transparent pricing with no hidden surprises. You'll always know what you're paying before we start."
  - title: "All Makes Welcome"
    icon: "fas fa-car"
    color: "red"
    desc: "From Japanese economy cars to European performance vehicles — if it has an engine, we can service it."
  - title: "Conveniently Located"
    icon: "fas fa-map-marker-alt"
    color: "blue"
    desc: "Situated in Plankenburg, Stellenbosch — easily accessible from Stellenbosch, Paarl, and the greater Cape Town area."
