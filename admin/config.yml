backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ============================================================
  # SITE SETTINGS
  # ============================================================
  - label: "⚙️ Site Settings"
    name: "settings"
    files:

      - label: "Contact & Business Info"
        name: "site"
        file: "_data/site.yaml"
        fields:
          - label: "Phone Number"
            name: phone
            widget: string
            hint: "e.g. 021 883 8512"
          - label: "Email Address"
            name: email
            widget: string
          - label: "Street Address"
            name: address
            widget: string
          - label: "Weekday Hours (Mon–Thu)"
            name: hours_weekdays
            widget: string
            hint: "e.g. 07:30 – 17:00"
          - label: "Friday Hours"
            name: hours_friday
            widget: string
            hint: "e.g. 07:30 – 15:00"
          - label: "Footer Description"
            name: tagline
            widget: text

  # ============================================================
  # PAGES
  # ============================================================
  - label: "📄 Pages"
    name: "pages"
    files:

      # ---------- HOME PAGE ----------
      - label: "Home Page"
        name: "home"
        file: "_data/home.yaml"
        fields:
          - label: "Hero Label (small text above title)"
            name: hero_label
            widget: string
          - label: "Hero Title — Line 1"
            name: hero_title_main
            widget: string
            hint: "e.g. Where Performance"
          - label: "Hero Title — Line 2 (shown in red)"
            name: hero_title_highlight
            widget: string
            hint: "e.g. Meets Precision"
          - label: "Hero Description"
            name: hero_desc
            widget: text

          - label: "Stats Bar"
            name: stats
            widget: list
            summary: "{{fields.number}} — {{fields.label}}"
            fields:
              - { label: "Number", name: number, widget: string }
              - { label: "Label", name: label, widget: string }

          - label: "About Section Title"
            name: about_title
            widget: string
          - label: "About Paragraph 1"
            name: about_text1
            widget: text
          - label: "About Paragraph 2"
            name: about_text2
            widget: text
          - label: "About — Feature Bullet Points"
            name: features
            widget: list
            field: { label: "Feature", name: item, widget: string }

          - label: "Race Banner Title"
            name: race_title
            widget: string
          - label: "Race Banner Description"
            name: race_desc
            widget: text

      # ---------- ABOUT PAGE ----------
      - label: "About Page"
        name: "about"
        file: "_data/about.yaml"
        fields:
          - label: "Story Section Heading"
            name: story_heading
            widget: string
          - label: "Story Paragraph 1"
            name: story_p1
            widget: text
          - label: "Story Paragraph 2"
            name: story_p2
            widget: text
          - label: "Story Paragraph 3"
            name: story_p3
            widget: text
          - label: "Quote Text"
            name: quote_text
            widget: text

          - label: "Core Values"
            name: values
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Icon (FontAwesome class)", name: icon, widget: string, hint: "e.g. fas fa-medal" }
              - { label: "Description", name: desc, widget: text }

          - label: "Why Choose Us Cards"
            name: why
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Icon (FontAwesome class)", name: icon, widget: string }
              - label: "Accent Colour"
                name: color
                widget: select
                options: ["red", "blue"]
              - { label: "Description", name: desc, widget: text }

      # ---------- SERVICES PAGE ----------
      - label: "Services Page"
        name: "services"
        file: "_data/services.yaml"
        fields:
          - label: "Section Title"
            name: intro_title
            widget: string
          - label: "Section Introduction Text"
            name: intro_text
            widget: text

          - label: "Services List"
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "Service Name", name: name, widget: string }
              - { label: "Icon (FontAwesome class)", name: icon, widget: string, hint: "e.g. fas fa-cogs" }
              - { label: "Short Description (shown on home page)", name: short_desc, widget: text }
              - { label: "Full Description (shown on services page)", name: description, widget: text }

      # ---------- PERFORMANCE PAGE ----------
      - label: "Performance Page"
        name: "performance"
        file: "_data/performance.yaml"
        fields:
          - label: "Intro Paragraph 1"
            name: intro_p1
            widget: text
          - label: "Intro Paragraph 2"
            name: intro_p2
            widget: text
          - label: "Intro Paragraph 3"
            name: intro_p3
            widget: text

          - label: "Performance Services"
            name: services
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Icon (FontAwesome class)", name: icon, widget: string }
              - { label: "Description", name: desc, widget: text }

          - label: "Build Process Steps"
            name: process
            widget: list
            summary: "{{fields.num}} — {{fields.title}}"
            fields:
              - { label: "Step Number", name: num, widget: string, hint: "e.g. 01" }
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: desc, widget: text }
